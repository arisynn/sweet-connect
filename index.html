<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#ec4899">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Sweet Connect">
    
    <!-- Open Graph / Link Previews -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Sweet Connect - Puzzle Game">
    <meta property="og:description" content="Mainkan Sweet Connect, kumpulkan koin, buka tema menarik, dan dapatkan skor tertinggi di game puzzle yang adiktif ini!">
    <meta property="og:image" content="/logo.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Sweet Connect - Puzzle Game">
    <meta name="twitter:description" content="Mainkan Sweet Connect, kumpulkan koin, buka tema menarik, dan dapatkan skor tertinggi di game puzzle yang adiktif ini!">
    <meta name="twitter:image" content="/logo.png">

    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" href="/logo.png">
    <link rel="apple-touch-icon" href="/logo.png">
    <title>Sweet Connect</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" crossorigin="anonymous"></script>

    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div id="root"></div>
    <script>
        window.addEventListener("error", function(e) {
            console.error("GLOBAL ERROR:", e.message, e.filename, e.lineno, e.colno, e.error);
            const div = document.createElement("div");
            div.style.color = "red";
            div.style.position = "fixed";
            div.style.top = "0";
            div.style.zIndex = "9999";
            div.innerText = e.message + " in " + e.filename + ":" + e.lineno;
            document.body.appendChild(div);
        });
    </script>


    <script>
        const scriptUrls = [
            "/js/config.js",
            "/js/pushManager.js",
            "/js/notifications.js",
            "/js/chest.js",
            "/js/utils.js",
            "/js/audio.js",
            "/js/storage.js",
            "/js/difficulty.js",
            "/js/messages.js",
            "/js/gachaConfig.js",
            "/js/misiHarian.js",
            "/js/loginReward.js",
            "/js/misiMingguan.js",
            "/js/misiBerulang.js",
            "/js/dailyReward.js",
            "/js/achievements.js",
            "/js/milestones.js",
            "/js/combo.js",
            "/js/statistics.js",
            "/components/icons.js",
            "/components/dialogSystem.js",
            "/components/chestUI.js",
            "/components/loginRewardScreen.js",
            "/components/modal.js",
            "/components/installPrompt.js",
            "/components/StartupScreen.js",
            "/components/mysteryGift.js",
            "/components/shop.js",
            "/components/themeScreen.js",
            "/components/settings.js",
            "/components/customThemeEditor.js",
            "/components/dailyReward.js",
            "/components/achievementsScreen.js",
            "/components/statisticsScreen.js",
            "/components/comboOverlay.js",
            "/components/rewardProgressBar.js",
            "/components/notificationPrompt.js",
            "/components/pushDebugConsole.js",
            "/game/GameContext.js",
            "/game/board.js",
            "/game/timer.js",
            "/game/score.js",
            "/game/GameUI.js",
            "/game/game.js",
            "/js/app.js",
        ];
        Promise.all(scriptUrls.map(src => fetch(src + '?v=' + Date.now()).then(r => r.text())))
            .then(codes => {
                const fullCode = codes.join('\n\n');
                const compiled = Babel.transform(fullCode, { presets: [['react', { runtime: 'classic' }]] }).code;
                const script = document.createElement('script');
                script.innerHTML = compiled;
                document.body.appendChild(script);
            })
            .catch(err => {
                console.error("Failed to load or compile scripts:", err);
            });
    </script>
</body>

</html>
